server:
  port: 8080

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:${DB_URL:jdbc:mysql://localhost:3306/cloud_storage?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}}
    username: ${SPRING_DATASOURCE_USERNAME:${DB_USER:root}}
    password: ${SPRING_DATASOURCE_PASSWORD:${DB_PASSWORD:admin}}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    open-in-view: true
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  mail:
    host: ${SPRING_MAIL_HOST:${MAIL_HOST:smtp.gmail.com}}
    port: ${SPRING_MAIL_PORT:${MAIL_PORT:465}}
    username: ${SPRING_MAIL_USERNAME:${MAIL_USERNAME:}}
    password: ${SPRING_MAIL_PASSWORD:${MAIL_PASSWORD:}}
    protocol: ${SPRING_MAIL_PROTOCOL:${MAIL_PROTOCOL:smtps}}
    properties:
      mail:
        smtp:
          auth: true
          ssl:
            enable: true
            trust: ${SPRING_MAIL_HOST:${MAIL_HOST:smtp.gmail.com}}
        smtps:
          auth: true
          ssl:
            enable: true
            trust: ${SPRING_MAIL_HOST:${MAIL_HOST:smtp.gmail.com}}
  servlet:
    multipart:
      max-file-size: 500MB
      max-request-size: 500MB

jwt:
  secret: ${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
  expiration: 86400000
  refresh-expiration: 604800000

storage:
  type: local           # local or s3
  local:
    upload-dir: ./uploads
  s3:
    bucket-name: your-bucket-name
    region: us-east-1
    access-key: your-access-key
    secret-key: your-secret-key

encryption:
  secret-key: ${ENCRYPTION_SECRET_KEY:${ENCRYPTION_KEY:MySuperSecretKey1234567890123456}}

app:
  default-storage-quota: 5368709120   # 5 GB in bytes
  google-client-id: ${GOOGLE_CLIENT_ID:212001299605-t45f4cnh1bgmjavkfbill70iemjkdba2.apps.googleusercontent.com}
  cors:
    allowed-origins: http://localhost:3000,http://localhost:5173
  ai:
    gemini:
      api-key: ${GEMINI_API_KEY:}
      model-text: gemini-3.5-flash
      model-embedding: text-embedding-004

logging:
  level:
    com.cloudstorage: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never
